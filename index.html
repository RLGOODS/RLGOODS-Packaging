<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RL Goods — Packaging Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #181818;
  --border: #222222;
  --text: #e8e0d0;
  --muted: #555555;
  --sbw: 320px;
  --accent-primary: #9e2a2a;
  --gold: #c8a96e;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; }

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 50px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 0; z-index: 200;
}
.tb-logo { font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:5px; color:var(--gold); margin-right:20px; flex-shrink:0; cursor:pointer; }
.tb-logo:hover { opacity: 0.8; }
.tb-sep { width:1px; height:22px; background:var(--border); margin-right:4px; flex-shrink:0; }
.tab-nav { display:flex; height:50px; align-items:stretch; }
.tab-btn {
  font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px;
  color:var(--muted); background:none; border:none; padding:0 20px;
  cursor:pointer; border-bottom:2px solid transparent; transition:color .15s,border-color .15s; white-space:nowrap;
}
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--text); border-bottom-color:var(--gold); }
.tb-spacer { flex:1; }
.btn-print {
  font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px;
  color:#0a0a0a; background:var(--gold); border:none; padding:8px 18px; cursor:pointer; transition:opacity .15s; flex-shrink:0; margin-right:10px;
}
.btn-print:hover { opacity:.82; }
.btn-auth {
  font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px;
  color:var(--text); background:transparent; border:1px solid var(--border); padding:8px 14px; cursor:pointer; transition:all .15s; flex-shrink:0;
}
.btn-auth:hover { border-color:var(--gold); color:var(--gold); }

/* ── SHELL ── */
.shell { display:flex; padding-top:50px; height:100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width:var(--sbw); flex-shrink:0; background:var(--bg2); border-right:1px solid var(--border);
  overflow-y:auto; height:calc(100vh - 50px);
}
.sidebar::-webkit-scrollbar { width:3px; }
.sidebar::-webkit-scrollbar-thumb { background:#2a2a2a; }
.sb-sec { border-bottom:1px solid var(--border); padding:16px 18px; }
.sb-title {
  font-family:'Share Tech Mono',monospace; font-size:8.5px; letter-spacing:3px; color:var(--accent-primary);
  margin-bottom:13px; display:flex; align-items:center; gap:8px;
}
.sb-title::after { content:''; flex:1; height:1px; background:linear-gradient(to right,rgba(158,42,42,0.3),transparent); }
.field { margin-bottom:10px; }
.field:last-child { margin-bottom:0; }
.field label { display:block; font-family:'Share Tech Mono',monospace; font-size:7.5px; color:var(--muted); letter-spacing:2px; margin-bottom:4px; }
.field input[type=text], .field textarea {
  width:100%; background:var(--bg3); border:1px solid var(--border);
  color:var(--text); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:500;
  padding:6px 9px; outline:none; transition:border-color .15s;
}
.field input[type=text]:focus, .field textarea:focus { border-color:var(--accent-primary); }
.field textarea { resize:vertical; min-height:58px; line-height:1.5; }
.color-row { display:flex; align-items:center; gap:8px; }
.color-row input[type=color] { width:34px; height:34px; border:1px solid var(--border); background:none; padding:2px; cursor:pointer; flex-shrink:0; }
.color-row input[type=text] { flex:1; font-family:'Share Tech Mono',monospace; font-size:11px; }
.swatches { display:flex; gap:5px; flex-wrap:wrap; margin-top:7px; }
.swatch { width:20px; height:20px; border:1px solid #333; cursor:pointer; transition:transform .1s,border-color .1s; }
.swatch:hover { transform:scale(1.2); border-color:#666; }
.swatch.active { border-color:var(--gold) !important; outline:1px solid var(--gold); }
.badge-grid { display:flex; gap:5px; flex-wrap:wrap; }
.badge-btn {
  font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:1px;
  padding:4px 9px; border:1px solid var(--border); background:none; color:var(--muted); cursor:pointer; transition:all .15s;
}
.badge-btn:hover { border-color:var(--accent-primary); color:var(--text); }
.badge-btn.active { background:var(--accent-primary); border-color:var(--accent-primary); color:#fff; }
.tog-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; }
.tog-row:last-child { margin-bottom:0; }
.tog-label { font-family:'Share Tech Mono',monospace; font-size:7.5px; color:var(--muted); letter-spacing:1.5px; }
.tog { width:34px; height:18px; background:var(--border); border-radius:9px; position:relative; cursor:pointer; transition:background .2s; flex-shrink:0; }
.tog.on { background:var(--accent-primary); }
.tog::after { content:''; position:absolute; width:12px; height:12px; background:#fff; border-radius:50%; top:3px; left:3px; transition:left .2s; }
.tog.on::after { left:19px; }

/* ── PREVIEW PANE ── */
.preview {
  flex:1; overflow:auto; background:#0f0f0f;
  display:flex; flex-direction:column; align-items:center; padding:36px 28px 60px; gap:0;
}
.preview::-webkit-scrollbar { width:5px; }
.preview::-webkit-scrollbar-thumb { background:#222; }
.pv-header { align-self:flex-start; font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:3px; color:#2a2a2a; margin-bottom:20px; }
.page-view { display:none; width:100%; flex-direction:column; align-items:center; gap:20px; }
.page-view.active { display:flex; }

/* ── CASES PAGE ── */
.cases-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}
.case-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 20px;
  transition: all 0.2s;
  cursor: pointer;
}
.case-card:hover {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(200,169,110,0.1);
}
.case-card h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 8px;
  color: var(--gold);
}
.case-card .product-code {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  margin-bottom: 12px;
  letter-spacing: 1px;
}
.case-card .details {
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: 12px;
}
.case-card .detail-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 12px;
}
.case-card .detail-label {
  color: var(--muted);
}
.case-card .btn-select {
  width: 100%;
  background: var(--accent-primary);
  color: white;
  border: none;
  padding: 8px 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: opacity 0.15s;
  margin-top: 12px;
}
.case-card .btn-select:hover {
  opacity: 0.8;
}

/* ── SHARED PACKAGING ── */
.p-bgr { position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; }
.p-ctr { position:absolute; top:6px; right:6px; width:13px; height:13px; border-top:1px solid; border-right:1px solid; }
.p-cbl { position:absolute; bottom:6px; left:6px; width:13px; height:13px; border-bottom:1px solid; border-left:1px solid; }
.p-tri { position:absolute; top:0; right:0; width:0; height:0; border-style:solid; border-width:0 38px 38px 0; }
.p-tri-txt { position:absolute; top:6px; right:2px; font-family:'Share Tech Mono',monospace; font-size:6px; color:#e8e0d0cc; letter-spacing:1px; transform:rotate(45deg); transform-origin:center; }

/* ── INSERT CARD ── */
.ic { width:1.5in; height:2.5in; overflow:hidden; display:flex; flex-direction:column; position:relative; flex-shrink:0; }
.ic .ic-bar { height:3px; width:100%; flex-shrink:0; }
.ic .ic-bb { padding:8px 10px 5px; flex-shrink:0; }
.ic .ic-bn { font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:4px; line-height:1; }
.ic .ic-bs { font-family:'Share Tech Mono',monospace; font-size:5.5px; letter-spacing:2px; margin-top:2px; }
.ic .ic-div { height:1px; margin:0 10px; flex-shrink:0; }
.ic .ic-fa { flex:1; display:flex; flex-direction:column; padding:6px 10px 3px; overflow:hidden; }
.ic .ic-il { font-family:'Share Tech Mono',monospace; font-size:5.5px; letter-spacing:1.5px; margin-bottom:3px; }
.ic .ic-fn { font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:2px; color:#e8e0d0; line-height:1; }
.ic .ic-ft { font-family:'Rajdhani',sans-serif; font-size:8px; font-weight:600; color:#555; letter-spacing:0.5px; margin-top:2px; }
.ic .ic-bge { display:inline-flex; align-items:center; gap:3px; margin-top:5px; margin-bottom:6px; border:1px solid; padding:2px 6px; font-family:'Share Tech Mono',monospace; font-size:6px; letter-spacing:1.5px; font-weight:700; width:fit-content; }
.ic .ic-sdv { height:1px; margin:0 0 5px; flex-shrink:0; }
.ic .ic-sl { font-family:'Share Tech Mono',monospace; font-size:5.5px; letter-spacing:2px; margin-bottom:2px; }
.ic .ic-sn { font-family:'Rajdhani',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.5px; line-height:1.3; }
.ic .ic-sno { font-family:'Share Tech Mono',monospace; font-size:5.5px; letter-spacing:1px; margin-top:1px; margin-bottom:5px; }
.ic .ic-bio { font-family:'Rajdhani',sans-serif; font-size:7.5px; font-weight:500; color:#3a3a3a; letter-spacing:0.3px; line-height:1.5; }
.ic .ic-cn { padding:0 10px; margin-bottom:4px; flex-shrink:0; }
.ic .ic-cn p { font-family:'Rajdhani',sans-serif; font-size:7px; font-weight:500; color:#2a2a2a; letter-spacing:0.5px; text-transform:uppercase; border-top:1px solid #181818; padding-top:4px; line-height:1.4; }
.ic .ic-sr { padding:3px 10px 7px; display:flex; gap:6px; align-items:center; flex-shrink:0; }
.ic .ic-soc { font-family:'Share Tech Mono',monospace; font-size:5.5px; color:#2a2a2a; letter-spacing:1px; }
.ic .ic-dot { width:2px; height:2px; background:#222; border-radius:50%; }

/* ── SLEEVE ── */
.sl {
  width:8.16in; height:2.72in; overflow:hidden; display:grid; position:relative; flex-shrink:0;
  grid-template-columns:1.89in 1px 1.89in 1px 1.89in 1px 1.89in 1px 0.57in;
}
.sl .sl-sep { background:linear-gradient(to bottom,transparent,rgba(255,255,255,0.07) 30%,rgba(255,255,255,0.07) 70%,transparent); }
.sl .sl-pp { display:flex; flex-direction:column; justify-content:center; padding:10px 13px; position:relative; }
.sl .sl-rp { display:flex; flex-direction:column; justify-content:space-between; padding:10px 12px; }
.sl .sl-hbar { position:absolute; top:0; left:0; right:0; height:3px; }
.sl .sl-hlbl { position:absolute; top:6px; left:14px; font-family:'Share Tech Mono',monospace; font-size:6px; letter-spacing:3px; }
.sl .sl-br { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:7px; line-height:1; }
.sl .sl-tg { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:2px; margin-top:3px; }
.sl .sl-lbl { font-family:'Share Tech Mono',monospace; font-size:6.5px; letter-spacing:2px; margin-bottom:2px; }
.sl .sl-fig { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px; color:#e8e0d0; line-height:1; }
.sl .sl-thm { font-family:'Rajdhani',sans-serif; font-size:9px; font-weight:500; color:#555; letter-spacing:1px; margin:2px 0 3px; }
.sl .sl-sr { font-family:'Share Tech Mono',monospace; font-size:6px; letter-spacing:1.5px; margin-bottom:5px; }
.sl .sl-fts { display:flex; flex-direction:column; gap:3px; }
.sl .sl-ft { display:flex; align-items:center; gap:4px; font-family:'Rajdhani',sans-serif; font-size:9px; font-weight:500; color:#3a3a3a; }
.sl .sl-cnd { display:inline-flex; align-items:center; gap:4px; border:1px solid; padding:3px 7px; width:fit-content; font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:2px; font-weight:700; }
.sl .sl-scs { display:flex; flex-direction:column; gap:2px; }
.sl .sl-sc { font-family:'Share Tech Mono',monospace; font-size:6.5px; color:#252525; letter-spacing:1px; }
.sl .sl-bck { display:flex; flex-direction:column; justify-content:center; align-items:center; padding:10px 6px; position:relative; }
.sl .sl-blbl { font-family:'Share Tech Mono',monospace; font-size:6px; color:#1a1a1a; letter-spacing:2px; text-align:center; line-height:2; }
.sl .sl-tab { display:flex; flex-direction:column; justify-content:center; align-items:center; padding:6px; }
.sl .sl-tlbl { font-family:'Share Tech Mono',monospace; font-size:5.5px; color:#1a1a1a; letter-spacing:1px; writing-mode:vertical-rl; text-align:center; }
.sl .sl-wm { position:absolute; right:-14mm; top:50%; transform:translateY(-50%) rotate(90deg); font-family:'Bebas Neue',sans-serif; font-size:44px; letter-spacing:10px; white-space:nowrap; opacity:.03; }

.fold-mk { position:absolute; width:1px; top:0; bottom:0; background:repeating-linear-gradient(to bottom,rgba(200,169,110,0.3) 0,rgba(200,169,110,0.3) 4px,transparent 4px,transparent 8px); pointer-events:none; }
.fold-lbl { position:absolute; top:5px; font-family:'Share Tech Mono',monospace; font-size:6px; color:rgba(200,169,110,0.3); letter-spacing:1px; writing-mode:vertical-rl; pointer-events:none; }
.sl-caption { font-family:'Share Tech Mono',monospace; font-size:8.5px; color:#222; letter-spacing:2px; text-align:center; }

/* ── PRINT ── */
@media print {
  * { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  body { background:none; }
  .topbar, .sidebar, .preview { display:none !important; }
  .print-sheet { display:block !important; }
}
.print-sheet { display:none; width:8.5in; height:11in; background:#000; position:relative; overflow:hidden; }
.ps-ic { position:absolute; left:0.5in; top:0.5in; width:1.5in; height:2.5in; }
.ps-ic-cut { position:absolute; left:0.4in; top:0.4in; width:1.7in; height:2.7in; border:1px dashed rgba(158,42,42,.4); }
.ps-ic-lbl { position:absolute; left:0.4in; top:0.32in; font-family:'Share Tech Mono',monospace; font-size:7px; color:rgba(158,42,42,.4); letter-spacing:1px; }
.ps-sl { position:absolute; left:0.17in; top:0.5in; width:8.16in; height:2.72in; }
.ps-sl-cut { position:absolute; left:0.07in; top:0.4in; width:8.36in; height:2.92in; border:1px dashed rgba(158,42,42,.4); }
.ps-sl-lbl { position:absolute; left:0.07in; top:0.32in; font-family:'Share Tech Mono',monospace; font-size:7px; color:rgba(158,42,42,.4); letter-spacing:1px; }
.ps-score { position:absolute; width:1px; background:repeating-linear-gradient(to bottom,rgba(200,169,110,.55) 0,rgba(200,169,110,.55) 4px,transparent 4px,transparent 8px); }
.ps-slbl { position:absolute; font-family:'Share Tech Mono',monospace; font-size:7px; color:rgba(200,169,110,.45); letter-spacing:1px; writing-mode:vertical-rl; white-space:nowrap; }
.ps-footer { position:absolute; bottom:.25in; right:.4in; font-family:'Share Tech Mono',monospace; font-size:7px; color:#1a1a1a; letter-spacing:2px; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active {
  display: flex;
}
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 24px;
  max-width: 400px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 3px;
  margin-bottom: 16px;
  color: var(--gold);
}
.modal .field {
  margin-bottom: 12px;
}
.modal .btn-row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.modal .btn-row button {
  flex: 1;
  padding: 10px 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  transition: all 0.15s;
}
.modal .btn-row button:first-child {
  background: var(--accent-primary);
  border-color: var(--accent-primary);
  color: white;
}
.modal .btn-row button:hover {
  border-color: var(--gold);
}

/* ── SAVES PAGE ── */
.saves-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 15px;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}
.save-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 16px;
  transition: all 0.2s;
}
.save-card:hover {
  border-color: var(--gold);
  box-shadow: 0 0 15px rgba(200,169,110,0.1);
}
.save-card h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 2px;
  margin-bottom: 6px;
  color: var(--gold);
}
.save-card .date {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  margin-bottom: 10px;
  letter-spacing: 1px;
}
.save-card .actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.save-card .actions button {
  flex: 1;
  padding: 6px 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  transition: all 0.15s;
}
.save-card .actions button:hover {
  color: var(--text);
  border-color: var(--gold);
}
.save-card .actions button.delete {
  color: #8b4545;
}
.save-card .actions button.delete:hover {
  border-color: #8b4545;
  background: rgba(139,69,69,0.1);
}

/* ── AUTH PAGE ── */
.auth-container {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  width: 100%;
}
.auth-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 40px;
  max-width: 320px;
  width: 90%;
}
.auth-box h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 3px;
  margin-bottom: 8px;
  color: var(--gold);
  text-align: center;
}
.auth-box .subtitle {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-align: center;
  margin-bottom: 24px;
}
.auth-box .field {
  margin-bottom: 12px;
}
.auth-box input {
  width: 100%;
}
.auth-box .btn-submit {
  width: 100%;
  padding: 10px 12px;
  background: var(--accent-primary);
  color: white;
  border: none;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  margin-top: 12px;
  transition: opacity 0.15s;
}
.auth-box .btn-submit:hover {
  opacity: 0.8;
}
.auth-box .toggle-form {
  text-align: center;
  margin-top: 16px;
  font-size: 12px;
}
.auth-box .toggle-form button {
  background: none;
  border: none;
  color: var(--gold);
  cursor: pointer;
  padding: 0;
  font-family: inherit;
}
.error {
  color: #d97070;
  font-size: 11px;
  margin-top: 4px;
  font-family: 'Share Tech Mono', monospace;
}
.success {
  color: #7dd97d;
  font-size: 11px;
  margin-top: 4px;
  font-family: 'Share Tech Mono', monospace;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo" onclick="goToHome()">RL GOODS</div>
  <div class="tb-sep"></div>
  <nav class="tab-nav" id="navTabs"></nav>
  <div class="tb-spacer"></div>
  <div id="authSection"></div>
</div>

<div class="shell" id="shell" style="display:none;">
  <div class="sidebar" id="sidebar"></div>
  <div class="preview" id="preview"></div>
</div>

<div id="authPage" class="auth-container" style="padding-top:50px;"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<div class="print-sheet" id="printSheet"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const SUPABASE_URL = import.meta.env.VITE_SUPABASE_URL
const ANON_KEY = import.meta.env.VITE_SUPABASE_SUPABASE_ANON_KEY

const supabase = createClient(SUPABASE_URL, ANON_KEY)

const PRESETS = [
  {c:'#9e2a2a',l:'HTF Red'},{c:'#1e4a7a',l:'Blue'},{c:'#777777',l:'Silver'},
  {c:'#3a6b1a',l:'Green'},{c:'#6a3a8a',l:'Purple'},{c:'#1a5a5a',l:'Teal'},
  {c:'#7a4a1a',l:'Bronze'},{c:'#4a1818',l:'Deep Red'},
]

const state = {
  currentPage: 'home',
  currentUser: null,
  designs: [],
  cases: [],
  figName:'Wes Janson', figTheme:'Star Wars · Rebel Alliance Pilot',
  itemNo:'sw0729', refNo:'HTF — 001',
  setName:'Assault on Hoth — UCS', setNo:'75098-1',
  bio:'Veteran Rebel pilot & gunner. Served with Rogue Squadron at the Battle of Hoth. Exclusive to the UCS set — never sold separately.',
  badge:'HARD TO FIND', tagline:'// HARD TO FIND',
  fb:'FB: RL Goods', ig:'IG: @rlgoods',
  accent:'#9e2a2a', gold:'#c8a96e',
  showHTF:true, showBio:true, showSet:true, showCase:true,
  activePage:'insert',
  selectedCaseId: null,
  currentDesignId: null,
}

function ha(hex,a){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }

function save() { try{localStorage.setItem('rlg-design',JSON.stringify(state));}catch(e){} }
function load() { try{const r=localStorage.getItem('rlg-design');if(r)Object.assign(state,JSON.parse(r));}catch(e){} }

function buildSwatches(){
  const c=document.getElementById('swatches')
  if(!c) return
  c.innerHTML=''
  PRESETS.forEach(p=>{
    const s=document.createElement('div')
    s.className='swatch'+(p.c===state.accent?' active':'')
    s.style.background=p.c; s.title=p.l
    s.onclick=()=>{
      document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'))
      s.classList.add('active')
      state.accent=p.c
      document.getElementById('colorPicker').value=p.c
      document.getElementById('colorHex').value=p.c
      update()
    }
    c.appendChild(s)
  })
}

function onAcc(v){state.accent=v;document.getElementById('colorHex').value=v;document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));update();}
function onAccHex(v){if(/^#[0-9a-fA-F]{6}$/.test(v)){state.accent=v;document.getElementById('colorPicker').value=v;document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));update();}}
function onGld(v){state.gold=v;document.getElementById('goldHex').value=v;update();}
function onGldHex(v){if(/^#[0-9a-fA-F]{6}$/.test(v)){state.gold=v;document.getElementById('goldPicker').value=v;update();}}

function setBadge(btn,badge,tagline){
  state.badge=badge;state.tagline=tagline;
  document.querySelectorAll('.badge-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); update();
}
function togOpt(id,key){
  state[key]=!state[key];
  document.getElementById(id).classList.toggle('on',state[key]);
  update();
}

function icHTML(posClass){
  const a=state.accent,g=state.gold;
  return `<div class="ic ${posClass}" style="background:#0c0c0c;border:1px solid ${ha(a,.3)};">
    <div class="p-bgr" style="background-image:linear-gradient(${ha(a,.05)} 1px,transparent 1px),linear-gradient(90deg,${ha(a,.05)} 1px,transparent 1px);background-size:9mm 9mm;"></div>
    <div class="ic-bar" style="background:${a};"></div>
    ${state.showHTF?`<div class="p-tri" style="border-color:transparent ${a} transparent transparent;"></div><div class="p-tri-txt">${state.badge==='HARD TO FIND'?'HTF':'★'}</div>`:''}
    <div class="p-ctr" style="border-color:${ha(a,.35)};"></div>
    <div class="p-cbl" style="border-color:${ha(a,.35)};"></div>
    <div class="ic-bb">
      <div class="ic-bn" style="color:${g};">RL GOODS</div>
      <div class="ic-bs" style="color:${ha(a,.65)};">${state.tagline}</div>
    </div>
    <div class="ic-div" style="background:linear-gradient(to right,${ha(a,.35)},transparent);"></div>
    <div class="ic-fa">
      <div class="ic-il" style="color:${ha(a,.7)};">// ${state.refNo} · ITEM: ${state.itemNo}</div>
      <div class="ic-fn">${state.figName}</div>
      <div class="ic-ft">${state.figTheme}</div>
      <div class="ic-bge" style="background:${ha(a,.15)};border-color:${ha(a,.6)};color:${a};">
        <span style="display:inline-block;width:4px;height:4px;background:${a};border-radius:50%;"></span>${state.badge}
      </div>
      ${state.showSet?`<div class="ic-sdv" style="background:#1c1c1c;"></div>
        <div class="ic-sl" style="color:${ha(a,.55)};">// APPEARED IN SET</div>
        <div class="ic-sn" style="color:${ha(a,.55)};">${state.setName}</div>
        <div class="ic-sno" style="color:#333;">Set No: ${state.setNo}</div>`:''}
      ${state.showBio?`<div class="ic-bio">${state.bio}</div>`:''}
    </div>
    ${state.showCase?`<div class="ic-cn"><p>Includes light-compatible acrylic display case</p></div>`:''}
    <div class="ic-sr"><span class="ic-soc">${state.fb}</span><span class="ic-dot"></span><span class="ic-soc">${state.ig}</span></div>
  </div>`;
}

function slHTML(posClass){
  const a=state.accent,g=state.gold;
  const dot=`<span style="display:inline-block;width:3px;height:3px;background:${a};border-radius:50%;flex-shrink:0;margin-right:4px;"></span>`;
  return `<div class="sl ${posClass}" style="background:#0c0c0c;border:1px solid ${ha(a,.3)};">
    <div class="p-bgr" style="background-image:linear-gradient(${ha(a,.04)} 1px,transparent 1px),linear-gradient(90deg,${ha(a,.04)} 1px,transparent 1px);background-size:9mm 9mm;"></div>
    <div class="sl-hbar" style="background:linear-gradient(to right,${a},transparent);"></div>
    <div class="sl-hlbl" style="color:${ha(a,.5)};">${state.tagline.replace('//','').trim()}</div>
    <div class="sl-wm" style="color:${a};">${state.figName.toUpperCase()}</div>
    <div class="sl-bck" style="border-right:1px dashed ${ha(a,.2)};"><div class="sl-blbl">BACK PANEL<br>TAPE HERE</div></div>
    <div class="sl-sep"></div>
    <div class="sl-pp" style="padding-top:18px;">
      <div class="sl-br" style="color:${g};">RL<br>GOODS</div>
      <div class="sl-tg" style="color:${ha(a,.6)};">${state.tagline}</div>
    </div>
    <div class="sl-sep"></div>
    <div class="sl-pp" style="padding-top:18px;">
      <div class="sl-lbl" style="color:${ha(a,.6)};">// ITEM NO: ${state.itemNo}</div>
      <div class="sl-fig">${state.figName}</div>
      <div class="sl-thm">${state.figTheme}</div>
      ${state.showSet?`<div class="sl-sr" style="color:${ha(a,.45)};">${state.setName} · Set ${state.setNo}</div>`:''}
      <div class="sl-fts">
        ${state.showSet?`<div class="sl-ft">${dot}UCS exclusive — never sold separately</div>`:''}
        ${state.showCase?`<div class="sl-ft">${dot}Light-compatible acrylic display case</div>`:''}
        <div class="sl-ft">${dot}Hand-inspected before sale</div>
      </div>
    </div>
    <div class="sl-sep"></div>
    <div class="sl-rp" style="padding-top:18px;">
      <div class="sl-cnd" style="background:${ha(a,.15)};border-color:${ha(a,.55)};color:${a};">
        <span style="display:inline-block;width:4px;height:4px;background:${a};border-radius:50%;"></span>${state.badge.split(' ')[0]}
      </div>
      <div class="sl-scs"><div class="sl-sc">${state.fb}</div><div class="sl-sc">${state.ig}</div></div>
    </div>
    <div class="sl-tab" style="background:#0a0a0a;border-left:1px dashed ${ha(a,.4)};"><div class="sl-tlbl">OVERLAP · TAPE</div></div>
  </div>`;
}

function renderIC(){ document.getElementById('icWrap').innerHTML=icHTML(''); }

function renderSL(){
  const wrap=document.getElementById('slWrap');
  wrap.innerHTML=slHTML('')+
    `<div class="fold-mk" style="left:1.89in;"><div class="fold-lbl" style="left:2px;">FOLD 1</div></div>`+
    `<div class="fold-mk" style="left:3.78in;"><div class="fold-lbl" style="left:2px;">FOLD 2</div></div>`+
    `<div class="fold-mk" style="left:5.67in;"><div class="fold-lbl" style="left:2px;">FOLD 3</div></div>`+
    `<div class="fold-mk" style="left:7.56in;"><div class="fold-lbl" style="left:2px;">TAB</div></div>`;
  document.getElementById('slCaption').textContent='← BACK  ·  RL GOODS  ·  FRONT (fig info)  ·  SIDE (badge)  ·  TAB →   —   score gold lines before folding';
}

function readInputs(){
  state.figName=document.getElementById('figName').value;
  state.figTheme=document.getElementById('figTheme').value;
  state.itemNo=document.getElementById('itemNo').value;
  state.refNo=document.getElementById('refNo').value;
  state.setName=document.getElementById('setName').value;
  state.setNo=document.getElementById('setNo').value;
  state.bio=document.getElementById('bio').value;
  state.fb=document.getElementById('fbHandle').value;
  state.ig=document.getElementById('igHandle').value;
}

function update(){
  readInputs(); renderIC(); renderSL(); save();
}

function switchTab(page){
  state.activePage=page;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+page).classList.add('active');
  document.querySelectorAll('.page-view').forEach(v=>v.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  save();
}

function triggerPrint(){
  const sheet=document.getElementById('printSheet');
  if(state.activePage==='insert'){
    sheet.innerHTML=icHTML('ps-ic')+
      `<div class="ps-ic-cut"></div>`+
      `<div class="ps-ic-lbl">CUT LINE — INSERT CARD  (1.5 × 2.5 in)</div>`+
      `<div class="ps-footer">RL GOODS · ${state.figName.toUpperCase()} · ${state.itemNo} · INSERT CARD</div>`;
  } else {
    sheet.innerHTML=slHTML('ps-sl')+
      `<div class="ps-sl-cut"></div>`+
      `<div class="ps-sl-lbl">CUT LINE — SLEEVE (all 4 sides + tab)</div>`+
      `<div class="ps-score" style="left:2.06in;top:0.4in;height:2.92in;"></div><div class="ps-slbl" style="left:2.09in;top:0.45in;">FOLD</div>`+
      `<div class="ps-score" style="left:3.95in;top:0.4in;height:2.92in;"></div><div class="ps-slbl" style="left:3.98in;top:0.45in;">FOLD</div>`+
      `<div class="ps-score" style="left:5.84in;top:0.4in;height:2.92in;"></div><div class="ps-slbl" style="left:5.87in;top:0.45in;">FOLD</div>`+
      `<div class="ps-score" style="left:7.73in;top:0.4in;height:2.92in;"></div><div class="ps-slbl" style="left:7.76in;top:0.45in;">TAB</div>`+
      `<div class="ps-footer">RL GOODS · ${state.figName.toUpperCase()} · ${state.itemNo} · SLEEVE</div>`;
  }
  window.print();
}

function renderGenerator(){
  document.getElementById('shell').style.display='flex'
  document.getElementById('authPage').innerHTML=''

  const sidebar=document.getElementById('sidebar')
  sidebar.innerHTML=`
    <div class="sb-sec">
      <div class="sb-title">01 — FIGURE</div>
      <div class="field"><label>Figure Name</label><input type="text" id="figName" value="${state.figName}" oninput="update()"></div>
      <div class="field"><label>Theme / Line</label><input type="text" id="figTheme" value="${state.figTheme}" oninput="update()"></div>
      <div class="field"><label>Item Number</label><input type="text" id="itemNo" value="${state.itemNo}" oninput="update()"></div>
      <div class="field"><label>Internal Ref</label><input type="text" id="refNo" value="${state.refNo}" oninput="update()"></div>
    </div>

    <div class="sb-sec">
      <div class="sb-title">02 — SET</div>
      <div class="field"><label>Set Name</label><input type="text" id="setName" value="${state.setName}" oninput="update()"></div>
      <div class="field"><label>Set Number</label><input type="text" id="setNo" value="${state.setNo}" oninput="update()"></div>
      <div class="field"><label>Bio / Description</label><textarea id="bio" oninput="update()">${state.bio}</textarea></div>
    </div>

    <div class="sb-sec">
      <div class="sb-title">03 — BADGE</div>
      <div class="badge-grid">
        <button class="badge-btn ${state.badge==='HARD TO FIND'?'active':''}" onclick="setBadge(this,'HARD TO FIND','// HARD TO FIND')">HTF</button>
        <button class="badge-btn ${state.badge==="COLLECTOR'S PICK"?'active':''}" onclick="setBadge(this,'COLLECTOR\\'S PICK','// COLLECTOR\\'S')">COLLECTOR</button>
        <button class="badge-btn ${state.badge==='LICENSED THEME'?'active':''}" onclick="setBadge(this,'LICENSED THEME','// LICENSED')">LICENSED</button>
        <button class="badge-btn ${state.badge==='RETIRED THEME'?'active':''}" onclick="setBadge(this,'RETIRED THEME','// RETIRED')">RETIRED</button>
        <button class="badge-btn ${state.badge==='GOOD CONDITION'?'active':''}" onclick="setBadge(this,'GOOD CONDITION','// MINIFIGURES')">STANDARD</button>
        <button class="badge-btn ${state.badge==='BUNDLE PACK'?'active':''}" onclick="setBadge(this,'BUNDLE PACK','// BUNDLE')">BUNDLE</button>
      </div>
    </div>

    <div class="sb-sec">
      <div class="sb-title">04 — SOCIALS</div>
      <div class="field"><label>Facebook</label><input type="text" id="fbHandle" value="${state.fb}" oninput="update()"></div>
      <div class="field"><label>Instagram</label><input type="text" id="igHandle" value="${state.ig}" oninput="update()"></div>
    </div>

    <div class="sb-sec">
      <div class="sb-title">05 — COLOURS</div>
      <div class="field">
        <label>Accent</label>
        <div class="color-row">
          <input type="color" id="colorPicker" value="${state.accent}" oninput="onAcc(this.value)">
          <input type="text" id="colorHex" value="${state.accent}" oninput="onAccHex(this.value)" maxlength="7">
        </div>
        <div class="swatches" id="swatches"></div>
      </div>
      <div class="field">
        <label>Brand / Gold</label>
        <div class="color-row">
          <input type="color" id="goldPicker" value="${state.gold}" oninput="onGld(this.value)">
          <input type="text" id="goldHex" value="${state.gold}" oninput="onGldHex(this.value)" maxlength="7">
        </div>
      </div>
    </div>

    <div class="sb-sec">
      <div class="sb-title">06 — OPTIONS</div>
      <div class="tog-row"><span class="tog-label">CORNER STAMP</span><div class="tog ${state.showHTF?'on':''}" id="togHTF" onclick="togOpt('togHTF','showHTF')"></div></div>
      <div class="tog-row"><span class="tog-label">BIO TEXT</span><div class="tog ${state.showBio?'on':''}" id="togBio" onclick="togOpt('togBio','showBio')"></div></div>
      <div class="tog-row"><span class="tog-label">SET INFO</span><div class="tog ${state.showSet?'on':''}" id="togSet" onclick="togOpt('togSet','showSet')"></div></div>
      <div class="tog-row"><span class="tog-label">CASE NOTE</span><div class="tog ${state.showCase?'on':''}" id="togCase" onclick="togOpt('togCase','showCase')"></div></div>
    </div>
  `

  const preview=document.getElementById('preview')
  preview.innerHTML=`
    <div class="page-view active" id="page-insert">
      <div class="pv-header">// INSERT CARD — 1.5 × 2.5 in · stands behind acrylic case</div>
      <div id="icWrap"></div>
    </div>

    <div class="page-view" id="page-sleeve">
      <div class="pv-header">// SLEEVE — 8.16 × 2.72 in · wraps all 4 sides + tab</div>
      <div id="slWrap" style="position:relative;"></div>
      <div class="sl-caption" id="slCaption"></div>
    </div>
  `

  buildSwatches()
  update()
}

function renderCases(){
  document.getElementById('shell').style.display='flex'
  document.getElementById('authPage').innerHTML=''

  const sidebar=document.getElementById('sidebar')
  sidebar.innerHTML=`
    <div class="sb-sec">
      <div class="sb-title">CASES LIBRARY</div>
      <p style="font-size:12px;line-height:1.5;color:var(--muted);">Browse available display cases optimized for RL Goods packaging. Click to select a case and customize packaging for it.</p>
    </div>
  `

  const preview=document.getElementById('preview')
  preview.innerHTML=`<div class="page-view active" style="display:flex;"><div class="cases-grid" id="casesGrid"></div></div>`

  const grid=document.getElementById('casesGrid')
  if(state.cases.length===0){
    grid.innerHTML='<p style="text-align:center;color:var(--muted);">No cases available. Add cases to continue.</p>'
    return
  }

  grid.innerHTML=state.cases.map(c=>`
    <div class="case-card">
      <h3>${c.name}</h3>
      <div class="product-code">${c.product_code}</div>
      <div class="details">
        <div class="detail-row"><span class="detail-label">Manufacturer</span><span>${c.manufacturer}</span></div>
        <div class="detail-row"><span class="detail-label">Dimensions</span><span>${c.dimensions_mm}mm</span></div>
        ${c.insert_card_width_in?`<div class="detail-row"><span class="detail-label">Insert</span><span>${c.insert_card_width_in}" × ${c.insert_card_height_in}"</span></div>`:''}
      </div>
      ${c.amazon_url?`<a href="${c.amazon_url}" target="_blank" style="color:var(--gold);font-size:11px;text-decoration:none;">View on Amazon →</a>`:''}
      <button class="btn-select" onclick="selectCase('${c.id}')">SELECT CASE</button>
    </div>
  `).join('')
}

function selectCase(caseId){
  state.selectedCaseId=caseId
  state.currentPage='generator'
  renderGenerator()
  document.querySelector('.tab-nav').innerHTML=`
    <button class="tab-btn active" id="tab-insert" onclick="switchTab('insert')">INSERT CARD</button>
    <button class="tab-btn" id="tab-sleeve" onclick="switchTab('sleeve')">SLEEVE</button>
  `
}

async function renderHome(){
  document.getElementById('shell').style.display='none'

  const content=`
    <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:40px;padding:40px;">
      <div style="text-align:center;max-width:600px;">
        <h1 style="font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:5px;margin-bottom:12px;color:var(--gold);">RL GOODS</h1>
        <h2 style="font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;color:var(--muted);margin-bottom:32px;">PACKAGING GENERATOR v2</h2>
        <p style="font-size:14px;line-height:1.8;color:var(--text);margin-bottom:32px;">Create custom packaging inserts and sleeves for your minifigure display cases. Choose a case, customize your product details, and print.</p>

        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <button onclick="goToCases()" style="padding:12px 24px;background:var(--accent-primary);color:white;border:none;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;transition:opacity 0.15s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">→ START DESIGNING</button>
          <button onclick="loadDesign()" style="padding:12px 24px;background:transparent;border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--border)'">LOAD SAVED</button>
        </div>
      </div>
    </div>
  `

  document.getElementById('authPage').innerHTML=content
}

window.goToHome=function(){
  state.currentPage='home'
  renderHome()
}

window.goToCases=function(){
  state.currentPage='cases'
  renderCases()
}

window.loadDesign=function(){
  if(!state.currentUser){
    alert('Please login to load saved designs')
    return
  }
  state.currentPage='saves'
  renderSaves()
}

async function renderSaves(){
  document.getElementById('shell').style.display='flex'

  const sidebar=document.getElementById('sidebar')
  sidebar.innerHTML=`
    <div class="sb-sec">
      <div class="sb-title">YOUR DESIGNS</div>
      <p style="font-size:12px;line-height:1.5;color:var(--muted);">Click a saved design to edit or delete.</p>
    </div>
  `

  const preview=document.getElementById('preview')
  preview.innerHTML=`<div class="page-view active" style="display:flex;"><div class="saves-grid" id="savesGrid"></div></div>`

  const {data:designs}=await supabase.from('designs').select('*').eq('user_id',state.currentUser.id)
  state.designs=designs||[]

  const grid=document.getElementById('savesGrid')
  if(!designs||designs.length===0){
    grid.innerHTML='<p style="text-align:center;color:var(--muted);grid-column:1/-1;">No saved designs yet.</p>'
    return
  }

  grid.innerHTML=designs.map(d=>`
    <div class="save-card">
      <h3>${d.figure_name}</h3>
      <div class="date">${new Date(d.created_at).toLocaleDateString()}</div>
      <div class="actions">
        <button onclick="loadSavedDesign('${d.id}')">EDIT</button>
        <button class="delete" onclick="deleteSavedDesign('${d.id}')">DELETE</button>
      </div>
    </div>
  `).join('')
}

window.loadSavedDesign=async function(designId){
  const {data:design}=await supabase.from('designs').select('*').eq('id',designId).maybeSingle()
  if(!design) return

  Object.assign(state,{
    figName:design.figure_name,
    figTheme:design.figure_theme,
    itemNo:design.item_no,
    refNo:design.ref_no,
    setName:design.set_name,
    setNo:design.set_no,
    bio:design.bio,
    fb:design.fb_handle,
    ig:design.ig_handle,
    accent:design.accent_color,
    gold:design.gold_color,
    badge:design.badge,
    showHTF:design.show_htf,
    showBio:design.show_bio,
    showSet:design.show_set,
    showCase:design.show_case,
    selectedCaseId:design.case_id,
    currentDesignId:design.id
  })

  state.currentPage='generator'
  renderGenerator()
  document.querySelector('.tab-nav').innerHTML=`
    <button class="tab-btn active" id="tab-insert" onclick="switchTab('insert')">INSERT CARD</button>
    <button class="tab-btn" id="tab-sleeve" onclick="switchTab('sleeve')">SLEEVE</button>
  `
}

window.deleteSavedDesign=async function(designId){
  if(!confirm('Delete this design?')) return
  await supabase.from('designs').delete().eq('id',designId)
  renderSaves()
}

async function fetchCases(){
  const {data:cases}=await supabase.from('cases').select('*')
  state.cases=cases||[]
}

async function checkAuth(){
  const {data:{session}}=await supabase.auth.getSession()
  state.currentUser=session?.user||null
  updateAuthUI()
}

function updateAuthUI(){
  const authSection=document.getElementById('authSection')
  if(state.currentUser){
    authSection.innerHTML=`<button class="btn-auth" onclick="logout()">${state.currentUser.email} → Logout</button>`
  } else {
    authSection.innerHTML=`<button class="btn-auth" onclick="showAuthModal('login')">Login</button><button class="btn-auth" onclick="showAuthModal('signup')" style="margin-left:8px;">Sign Up</button>`
  }
}

function showAuthModal(mode){
  const modal=document.getElementById('modal')
  modal.innerHTML=`
    <h2>${mode==='login'?'Login':'Create Account'}</h2>
    <div class="field">
      <label>Email</label>
      <input type="text" id="authEmail" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="">
    </div>
    <div id="authMessage"></div>
    <div class="btn-row">
      <button onclick="handleAuth('${mode}')">Continue</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  `
  document.getElementById('modalOverlay').classList.add('active')
}

window.handleAuth=async function(mode){
  const email=document.getElementById('authEmail').value
  const password=document.getElementById('authPassword').value
  const msg=document.getElementById('authMessage')

  if(!email||!password){
    msg.innerHTML='<div class="error">Email and password required</div>'
    return
  }

  try {
    if(mode==='login'){
      const {error}=await supabase.auth.signInWithPassword({email,password})
      if(error) throw error
    } else {
      const {error}=await supabase.auth.signUp({email,password})
      if(error) throw error
      msg.innerHTML='<div class="success">Check your email to confirm signup</div>'
      return
    }
    closeModal()
    checkAuth()
  } catch(e){
    msg.innerHTML=`<div class="error">${e.message}</div>`
  }
}

window.logout=async function(){
  await supabase.auth.signOut()
  checkAuth()
  goToHome()
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('active')
}

window.triggerPrint=triggerPrint
window.setBadge=setBadge
window.togOpt=togOpt
window.switchTab=switchTab
window.onAcc=onAcc
window.onAccHex=onAccHex
window.onGld=onGld
window.onGldHex=onGldHex
window.update=update

document.addEventListener('DOMContentLoaded',async ()=>{
  const navTabs=document.querySelector('.tab-nav')
  navTabs.innerHTML=`
    <button class="tab-btn active" onclick="goToCases()">DESIGNER</button>
    <button class="tab-btn" onclick="goToCases()" style="display:none;">CASES</button>
  `

  load()
  await checkAuth()
  await fetchCases()

  if(state.currentPage==='generator'&&state.selectedCaseId){
    renderGenerator()
  } else {
    renderHome()
  }
})
</script>
</body>
</html>
