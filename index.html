<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RL Goods — Packaging Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0a0a0a;
  --bg2:    #111111;
  --bg3:    #181818;
  --border: #222222;
  --text:   #e8e0d0;
  --muted:  #555555;
  --sbw:    320px;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; }

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 50px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 0; z-index: 200;
}
.tb-logo { font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:5px; color:#c8a96e; margin-right:20px; flex-shrink:0; }
.tb-sep  { width:1px; height:22px; background:var(--border); margin-right:4px; flex-shrink:0; }
.tab-nav { display:flex; height:50px; align-items:stretch; }
.tab-btn {
  font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px;
  color:var(--muted); background:none; border:none; padding:0 20px;
  cursor:pointer; border-bottom:2px solid transparent; transition:color .15s,border-color .15s; white-space:nowrap;
}
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--text); border-bottom-color:#c8a96e; }
.tb-spacer { flex:1; }
.btn-print {
  font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px;
  color:#0a0a0a; background:#c8a96e; border:none; padding:8px 18px; cursor:pointer; transition:opacity .15s; flex-shrink:0;
}
.btn-print:hover { opacity:.82; }

/* ── SHELL ── */
.shell { display:flex; padding-top:50px; height:100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width:var(--sbw); flex-shrink:0; background:var(--bg2); border-right:1px solid var(--border);
  overflow-y:auto; height:calc(100vh - 50px);
}
.sidebar::-webkit-scrollbar { width:3px; }
.sidebar::-webkit-scrollbar-thumb { background:#2a2a2a; }
.sb-sec { border-bottom:1px solid var(--border); padding:16px 18px; }
.sb-title {
  font-family:'Share Tech Mono',monospace; font-size:8.5px; letter-spacing:3px; color:#9e2a2a;
  margin-bottom:13px; display:flex; align-items:center; gap:8px;
}
.sb-title::after { content:''; flex:1; height:1px; background:linear-gradient(to right,#9e2a2a33,transparent); }
.field { margin-bottom:10px; }
.field:last-child { margin-bottom:0; }
.field label { display:block; font-family:'Share Tech Mono',monospace; font-size:7.5px; color:var(--muted); letter-spacing:2px; margin-bottom:4px; }
.field input[type=text], .field textarea {
  width:100%; background:var(--bg3); border:1px solid var(--border);
  color:var(--text); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:500;
  padding:6px 9px; outline:none; transition:border-color .15s;
}
.field input[type=text]:focus, .field textarea:focus { border-color:#9e2a2a; }
.field textarea { resize:vertical; min-height:58px; line-height:1.5; }
.color-row { display:flex; align-items:center; gap:8px; }
.color-row input[type=color] { width:34px; height:34px; border:1px solid var(--border); background:none; padding:2px; cursor:pointer; flex-shrink:0; }
.color-row input[type=text]  { flex:1; font-family:'Share Tech Mono',monospace; font-size:11px; }
.swatches { display:flex; gap:5px; flex-wrap:wrap; margin-top:7px; }
.swatch { width:20px; height:20px; border:1px solid #333; cursor:pointer; transition:transform .1s,border-color .1s; }
.swatch:hover { transform:scale(1.2); border-color:#666; }
.swatch.active { border-color:#c8a96e !important; outline:1px solid #c8a96e; }
.badge-grid { display:flex; gap:5px; flex-wrap:wrap; }
.badge-btn {
  font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:1px;
  padding:4px 9px; border:1px solid var(--border); background:none; color:var(--muted); cursor:pointer; transition:all .15s;
}
.badge-btn:hover { border-color:#9e2a2a; color:var(--text); }
.badge-btn.active { background:#9e2a2a; border-color:#9e2a2a; color:#fff; }
.tog-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; }
.tog-row:last-child { margin-bottom:0; }
.tog-label { font-family:'Share Tech Mono',monospace; font-size:7.5px; color:var(--muted); letter-spacing:1.5px; }
.tog { width:34px; height:18px; background:var(--border); border-radius:9px; position:relative; cursor:pointer; transition:background .2s; flex-shrink:0; }
.tog.on { background:#9e2a2a; }
.tog::after { content:''; position:absolute; width:12px; height:12px; background:#fff; border-radius:50%; top:3px; left:3px; transition:left .2s; }
.tog.on::after { left:19px; }

/* ── PREVIEW PANE ── */
.preview {
  flex:1; overflow:auto; background:#0f0f0f;
  display:flex; flex-direction:column; align-items:center; padding:36px 28px 60px; gap:0;
}
.preview::-webkit-scrollbar { width:5px; }
.preview::-webkit-scrollbar-thumb { background:#222; }
.pv-header { align-self:flex-start; font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:3px; color:#2a2a2a; margin-bottom:20px; }
.page-view { display:none; width:100%; flex-direction:column; align-items:center; gap:20px; }
.page-view.active { display:flex; }

/* ── SHARED PACKAGING ATOMS ── */
.p-bgr { position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; }
.p-ctr { position:absolute; top:6px; right:6px; width:13px; height:13px; border-top:1px solid; border-right:1px solid; }
.p-cbl { position:absolute; bottom:6px; left:6px; width:13px; height:13px; border-bottom:1px solid; border-left:1px solid; }
.p-tri { position:absolute; top:0; right:0; width:0; height:0; border-style:solid; border-width:0 38px 38px 0; }
.p-tri-txt { position:absolute; top:6px; right:2px; font-family:'Share Tech Mono',monospace; font-size:6px; color:#e8e0d0cc; letter-spacing:1px; transform:rotate(45deg); transform-origin:center; }

/* ── INSERT CARD ── */
.ic { width:1.5in; height:2.5in; overflow:hidden; display:flex; flex-direction:column; position:relative; flex-shrink:0; }
.ic .ic-bar { height:3px; width:100%; flex-shrink:0; }
.ic .ic-bb  { padding:8px 10px 5px; flex-shrink:0; }
.ic .ic-bn  { font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:4px; line-height:1; }
.ic .ic-bs  { font-family:'Share Tech Mono',monospace; font-size:5.5px; letter-spacing:2px; margin-top:2px; }
.ic .ic-div { height:1px; margin:0 10px; flex-shrink:0; }
.ic .ic-fa  { flex:1; display:flex; flex-direction:column; padding:6px 10px 3px; overflow:hidden; }
.ic .ic-il  { font-family:'Share Tech Mono',monospace; font-size:5.5px; letter-spacing:1.5px; margin-bottom:3px; }
.ic .ic-fn  { font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:2px; color:#e8e0d0; line-height:1; }
.ic .ic-ft  { font-family:'Rajdhani',sans-serif; font-size:8px; font-weight:600; color:#555; letter-spacing:0.5px; margin-top:2px; }
.ic .ic-bge { display:inline-flex; align-items:center; gap:3px; margin-top:5px; margin-bottom:6px; border:1px solid; padding:2px 6px; font-family:'Share Tech Mono',monospace; font-size:6px; letter-spacing:1.5px; font-weight:700; width:fit-content; }
.ic .ic-sdv { height:1px; margin:0 0 5px; flex-shrink:0; }
.ic .ic-sl  { font-family:'Share Tech Mono',monospace; font-size:5.5px; letter-spacing:2px; margin-bottom:2px; }
.ic .ic-sn  { font-family:'Rajdhani',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.5px; line-height:1.3; }
.ic .ic-sno { font-family:'Share Tech Mono',monospace; font-size:5.5px; letter-spacing:1px; margin-top:1px; margin-bottom:5px; }
.ic .ic-bio { font-family:'Rajdhani',sans-serif; font-size:7.5px; font-weight:500; color:#3a3a3a; letter-spacing:0.3px; line-height:1.5; }
.ic .ic-cn  { padding:0 10px; margin-bottom:4px; flex-shrink:0; }
.ic .ic-cn p { font-family:'Rajdhani',sans-serif; font-size:7px; font-weight:500; color:#2a2a2a; letter-spacing:0.5px; text-transform:uppercase; border-top:1px solid #181818; padding-top:4px; line-height:1.4; }
.ic .ic-sr  { padding:3px 10px 7px; display:flex; gap:6px; align-items:center; flex-shrink:0; }
.ic .ic-soc { font-family:'Share Tech Mono',monospace; font-size:5.5px; color:#2a2a2a; letter-spacing:1px; }
.ic .ic-dot { width:2px; height:2px; background:#222; border-radius:50%; }

/* ── SLEEVE ── */
.sl {
  width:8.16in; height:2.72in; overflow:hidden; display:grid; position:relative; flex-shrink:0;
  grid-template-columns:1.89in 1px 1.89in 1px 1.89in 1px 1.89in 1px 0.57in;
}
.sl .sl-sep  { background:linear-gradient(to bottom,transparent,rgba(255,255,255,0.07) 30%,rgba(255,255,255,0.07) 70%,transparent); }
.sl .sl-pp   { display:flex; flex-direction:column; justify-content:center; padding:10px 13px; position:relative; }
.sl .sl-rp   { display:flex; flex-direction:column; justify-content:space-between; padding:10px 12px; }
.sl .sl-hbar { position:absolute; top:0; left:0; right:0; height:3px; }
.sl .sl-hlbl { position:absolute; top:6px; left:14px; font-family:'Share Tech Mono',monospace; font-size:6px; letter-spacing:3px; }
.sl .sl-br   { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:7px; line-height:1; }
.sl .sl-tg   { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:2px; margin-top:3px; }
.sl .sl-lbl  { font-family:'Share Tech Mono',monospace; font-size:6.5px; letter-spacing:2px; margin-bottom:2px; }
.sl .sl-fig  { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px; color:#e8e0d0; line-height:1; }
.sl .sl-thm  { font-family:'Rajdhani',sans-serif; font-size:9px; font-weight:500; color:#555; letter-spacing:1px; margin:2px 0 3px; }
.sl .sl-sr   { font-family:'Share Tech Mono',monospace; font-size:6px; letter-spacing:1.5px; margin-bottom:5px; }
.sl .sl-fts  { display:flex; flex-direction:column; gap:3px; }
.sl .sl-ft   { display:flex; align-items:center; gap:4px; font-family:'Rajdhani',sans-serif; font-size:9px; font-weight:500; color:#3a3a3a; }
.sl .sl-cnd  { display:inline-flex; align-items:center; gap:4px; border:1px solid; padding:3px 7px; width:fit-content; font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:2px; font-weight:700; }
.sl .sl-scs  { display:flex; flex-direction:column; gap:2px; }
.sl .sl-sc   { font-family:'Share Tech Mono',monospace; font-size:6.5px; color:#252525; letter-spacing:1px; }
.sl .sl-bck  { display:flex; flex-direction:column; justify-content:center; align-items:center; padding:10px 6px; position:relative; }
.sl .sl-blbl { font-family:'Share Tech Mono',monospace; font-size:6px; color:#1a1a1a; letter-spacing:2px; text-align:center; line-height:2; }
.sl .sl-tab  { display:flex; flex-direction:column; justify-content:center; align-items:center; padding:6px; }
.sl .sl-tlbl { font-family:'Share Tech Mono',monospace; font-size:5.5px; color:#1a1a1a; letter-spacing:1px; writing-mode:vertical-rl; text-align:center; }
.sl .sl-wm   { position:absolute; right:-14mm; top:50%; transform:translateY(-50%) rotate(90deg); font-family:'Bebas Neue',sans-serif; font-size:44px; letter-spacing:10px; white-space:nowrap; opacity:.03; }

/* fold markers (screen only) */
.fold-mk { position:absolute; width:1px; top:0; bottom:0; background:repeating-linear-gradient(to bottom,#c8a96e55 0,#c8a96e55 4px,transparent 4px,transparent 8px); pointer-events:none; }
.fold-lbl { position:absolute; top:5px; font-family:'Share Tech Mono',monospace; font-size:6px; color:#c8a96e44; letter-spacing:1px; writing-mode:vertical-rl; pointer-events:none; }
.sl-caption { font-family:'Share Tech Mono',monospace; font-size:8.5px; color:#222; letter-spacing:2px; text-align:center; }

/* ── PRINT ── */
@media print {
  * { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  body { background:none; }
  .topbar, .sidebar, .preview { display:none !important; }
  .print-sheet { display:block !important; }
}
.print-sheet { display:none; width:8.5in; height:11in; background:#000; position:relative; overflow:hidden; }

/* insert card print position */
.ps-ic  { position:absolute; left:0.5in;  top:0.5in; width:1.5in; height:2.5in; }
.ps-ic-cut { position:absolute; left:0.4in; top:0.4in; width:1.7in; height:2.7in; border:1px dashed rgba(158,42,42,.4); }
.ps-ic-lbl { position:absolute; left:0.4in; top:0.32in; font-family:'Share Tech Mono',monospace; font-size:7px; color:rgba(158,42,42,.4); letter-spacing:1px; }

/* sleeve print position */
.ps-sl  { position:absolute; left:0.17in; top:0.5in; width:8.16in; height:2.72in; }
.ps-sl-cut { position:absolute; left:0.07in; top:0.4in; width:8.36in; height:2.92in; border:1px dashed rgba(158,42,42,.4); }
.ps-sl-lbl { position:absolute; left:0.07in; top:0.32in; font-family:'Share Tech Mono',monospace; font-size:7px; color:rgba(158,42,42,.4); letter-spacing:1px; }
.ps-score  { position:absolute; width:1px; background:repeating-linear-gradient(to bottom,rgba(200,169,110,.55) 0,rgba(200,169,110,.55) 4px,transparent 4px,transparent 8px); }
.ps-slbl   { position:absolute; font-family:'Share Tech Mono',monospace; font-size:7px; color:rgba(200,169,110,.45); letter-spacing:1px; writing-mode:vertical-rl; white-space:nowrap; }
.ps-footer { position:absolute; bottom:.25in; right:.4in; font-family:'Share Tech Mono',monospace; font-size:7px; color:#1a1a1a; letter-spacing:2px; }

</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">RL GOODS</div>
  <div class="tb-sep"></div>
  <nav class="tab-nav">
    <button class="tab-btn active" id="tab-insert" onclick="switchTab('insert')">INSERT CARD</button>
    <button class="tab-btn"        id="tab-sleeve" onclick="switchTab('sleeve')">SLEEVE</button>
  </nav>
  <div class="tb-spacer"></div>
  <button class="btn-print" onclick="triggerPrint()">⌘ PRINT</button>
</div>

<div class="shell">

  <div class="sidebar">

    <div class="sb-sec">
      <div class="sb-title">01 — FIGURE</div>
      <div class="field"><label>Figure Name</label><input type="text" id="figName" value="Wes Janson" oninput="update()"></div>
      <div class="field"><label>Theme / Line</label><input type="text" id="figTheme" value="Star Wars · Rebel Alliance Pilot" oninput="update()"></div>
      <div class="field"><label>Item Number</label><input type="text" id="itemNo" value="sw0729" oninput="update()"></div>
      <div class="field"><label>Internal Ref</label><input type="text" id="refNo" value="HTF — 001" oninput="update()"></div>
    </div>

    <div class="sb-sec">
      <div class="sb-title">02 — SET</div>
      <div class="field"><label>Set Name</label><input type="text" id="setName" value="Assault on Hoth — UCS" oninput="update()"></div>
      <div class="field"><label>Set Number</label><input type="text" id="setNo" value="75098-1" oninput="update()"></div>
      <div class="field"><label>Bio / Description</label><textarea id="bio" oninput="update()">Veteran Rebel pilot &amp; gunner. Served with Rogue Squadron at the Battle of Hoth. Exclusive to the UCS set — never sold separately.</textarea></div>
    </div>

    <div class="sb-sec">
      <div class="sb-title">03 — BADGE</div>
      <div class="badge-grid">
        <button class="badge-btn active" onclick="setBadge(this,'HARD TO FIND','// HARD TO FIND')">HTF</button>
        <button class="badge-btn" onclick="setBadge(this,'COLLECTOR\'S PICK','// COLLECTOR\'S')">COLLECTOR</button>
        <button class="badge-btn" onclick="setBadge(this,'LICENSED THEME','// LICENSED')">LICENSED</button>
        <button class="badge-btn" onclick="setBadge(this,'RETIRED THEME','// RETIRED')">RETIRED</button>
        <button class="badge-btn" onclick="setBadge(this,'GOOD CONDITION','// MINIFIGURES')">STANDARD</button>
        <button class="badge-btn" onclick="setBadge(this,'BUNDLE PACK','// BUNDLE')">BUNDLE</button>
      </div>
    </div>

    <div class="sb-sec">
      <div class="sb-title">04 — SOCIALS</div>
      <div class="field"><label>Facebook</label><input type="text" id="fbHandle" value="FB: RL Goods" oninput="update()"></div>
      <div class="field"><label>Instagram</label><input type="text" id="igHandle" value="IG: @rlgoods" oninput="update()"></div>
    </div>

    <div class="sb-sec">
      <div class="sb-title">05 — COLOURS</div>
      <div class="field">
        <label>Accent</label>
        <div class="color-row">
          <input type="color" id="colorPicker" value="#9e2a2a" oninput="onAcc(this.value)">
          <input type="text"  id="colorHex"    value="#9e2a2a" oninput="onAccHex(this.value)" maxlength="7">
        </div>
        <div class="swatches" id="swatches"></div>
      </div>
      <div class="field">
        <label>Brand / Gold</label>
        <div class="color-row">
          <input type="color" id="goldPicker" value="#c8a96e" oninput="onGld(this.value)">
          <input type="text"  id="goldHex"    value="#c8a96e" oninput="onGldHex(this.value)" maxlength="7">
        </div>
      </div>
    </div>

    <div class="sb-sec">
      <div class="sb-title">06 — OPTIONS</div>
      <div class="tog-row"><span class="tog-label">CORNER STAMP</span><div class="tog on" id="togHTF"  onclick="togOpt('togHTF','showHTF')"></div></div>
      <div class="tog-row"><span class="tog-label">BIO TEXT</span>     <div class="tog on" id="togBio"  onclick="togOpt('togBio','showBio')"></div></div>
      <div class="tog-row"><span class="tog-label">SET INFO</span>      <div class="tog on" id="togSet"  onclick="togOpt('togSet','showSet')"></div></div>
      <div class="tog-row"><span class="tog-label">CASE NOTE</span>     <div class="tog on" id="togCase" onclick="togOpt('togCase','showCase')"></div></div>
    </div>

  </div>

  <div class="preview" id="preview">

    <div class="page-view active" id="page-insert">
      <div class="pv-header">// INSERT CARD — 1.5 × 2.5 in · stands behind acrylic case</div>
      <div id="icWrap"></div>
    </div>

    <div class="page-view" id="page-sleeve">
      <div class="pv-header">// SLEEVE — 8.16 × 2.72 in · wraps all 4 sides + tab</div>
      <div id="slWrap" style="position:relative;"></div>
      <div class="sl-caption" id="slCaption"></div>
    </div>

  </div>
</div>

<div class="print-sheet" id="printSheet"></div>

<script>
/* ════ STATE ════ */
const S = {
  figName:'Wes Janson', figTheme:'Star Wars · Rebel Alliance Pilot',
  itemNo:'sw0729', refNo:'HTF — 001',
  setName:'Assault on Hoth — UCS', setNo:'75098-1',
  bio:'Veteran Rebel pilot & gunner. Served with Rogue Squadron at the Battle of Hoth. Exclusive to the UCS set — never sold separately.',
  badge:'HARD TO FIND', tagline:'// HARD TO FIND',
  fb:'FB: RL Goods', ig:'IG: @rlgoods',
  accent:'#9e2a2a', gold:'#c8a96e',
  showHTF:true, showBio:true, showSet:true, showCase:true,
  activePage:'insert',
};

function save() { try{localStorage.setItem('rlg2',JSON.stringify(S));}catch(e){} }
function load() { try{const r=localStorage.getItem('rlg2');if(r)Object.assign(S,JSON.parse(r));}catch(e){} }

/* ════ PRESETS ════ */
const PRESETS=[
  {c:'#9e2a2a',l:'HTF Red'},{c:'#1e4a7a',l:'Blue'},{c:'#777777',l:'Silver'},
  {c:'#3a6b1a',l:'Green'},{c:'#6a3a8a',l:'Purple'},{c:'#1a5a5a',l:'Teal'},
  {c:'#7a4a1a',l:'Bronze'},{c:'#4a1818',l:'Deep Red'},
];

function buildSwatches(){
  const c=document.getElementById('swatches');
  PRESETS.forEach(p=>{
    const s=document.createElement('div');
    s.className='swatch'+(p.c===S.accent?' active':'');
    s.style.background=p.c; s.title=p.l;
    s.onclick=()=>{
      document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));
      s.classList.add('active');
      S.accent=p.c;
      document.getElementById('colorPicker').value=p.c;
      document.getElementById('colorHex').value=p.c;
      update();
    };
    c.appendChild(s);
  });
}

/* ════ COLOR ════ */
function ha(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function onAcc(v){S.accent=v;document.getElementById('colorHex').value=v;document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));update();}
function onAccHex(v){if(/^#[0-9a-fA-F]{6}$/.test(v)){S.accent=v;document.getElementById('colorPicker').value=v;document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));update();}}
function onGld(v){S.gold=v;document.getElementById('goldHex').value=v;update();}
function onGldHex(v){if(/^#[0-9a-fA-F]{6}$/.test(v)){S.gold=v;document.getElementById('goldPicker').value=v;update();}}

/* ════ BADGE / TOGGLE ════ */
function setBadge(btn,badge,tagline){
  S.badge=badge;S.tagline=tagline;
  document.querySelectorAll('.badge-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); update();
}
function togOpt(id,key){
  S[key]=!S[key];
  document.getElementById(id).classList.toggle('on',S[key]);
  update();
}

/* ════ TAB ════ */
function switchTab(page){
  S.activePage=page;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+page).classList.add('active');
  document.querySelectorAll('.page-view').forEach(v=>v.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  save();
}

/* ════ READ INPUTS ════ */
function readInputs(){
  S.figName  =document.getElementById('figName').value;
  S.figTheme =document.getElementById('figTheme').value;
  S.itemNo   =document.getElementById('itemNo').value;
  S.refNo    =document.getElementById('refNo').value;
  S.setName  =document.getElementById('setName').value;
  S.setNo    =document.getElementById('setNo').value;
  S.bio      =document.getElementById('bio').value;
  S.fb       =document.getElementById('fbHandle').value;
  S.ig       =document.getElementById('igHandle').value;
}

/* ════ IC HTML ════ */
function icHTML(posClass){
  const a=S.accent,g=S.gold;
  return `<div class="ic ${posClass}" style="background:#0c0c0c;border:1px solid ${ha(a,.3)};">
    <div class="p-bgr" style="background-image:linear-gradient(${ha(a,.05)} 1px,transparent 1px),linear-gradient(90deg,${ha(a,.05)} 1px,transparent 1px);background-size:9mm 9mm;"></div>
    <div class="ic-bar" style="background:${a};"></div>
    ${S.showHTF?`<div class="p-tri" style="border-color:transparent ${a} transparent transparent;"></div><div class="p-tri-txt">${S.badge==='HARD TO FIND'?'HTF':'★'}</div>`:''}
    <div class="p-ctr" style="border-color:${ha(a,.35)};"></div>
    <div class="p-cbl" style="border-color:${ha(a,.35)};"></div>
    <div class="ic-bb">
      <div class="ic-bn" style="color:${g};">RL GOODS</div>
      <div class="ic-bs" style="color:${ha(a,.65)};">${S.tagline}</div>
    </div>
    <div class="ic-div" style="background:linear-gradient(to right,${ha(a,.35)},transparent);"></div>
    <div class="ic-fa">
      <div class="ic-il" style="color:${ha(a,.7)};">// ${S.refNo} · ITEM: ${S.itemNo}</div>
      <div class="ic-fn">${S.figName}</div>
      <div class="ic-ft">${S.figTheme}</div>
      <div class="ic-bge" style="background:${ha(a,.15)};border-color:${ha(a,.6)};color:${a};">
        <span style="display:inline-block;width:4px;height:4px;background:${a};border-radius:50%;"></span>${S.badge}
      </div>
      ${S.showSet?`<div class="ic-sdv" style="background:#1c1c1c;"></div>
        <div class="ic-sl" style="color:${ha(a,.55)};">// APPEARED IN SET</div>
        <div class="ic-sn" style="color:${ha(a,.55)};">${S.setName}</div>
        <div class="ic-sno" style="color:#333;">Set No: ${S.setNo}</div>`:''}
      ${S.showBio?`<div class="ic-bio">${S.bio}</div>`:''}
    </div>
    ${S.showCase?`<div class="ic-cn"><p>Includes light-compatible acrylic display case</p></div>`:''}
    <div class="ic-sr"><span class="ic-soc">${S.fb}</span><span class="ic-dot"></span><span class="ic-soc">${S.ig}</span></div>
  </div>`;
}

/* ════ SL HTML ════ */
function slHTML(posClass){
  const a=S.accent,g=S.gold;
  const dot=`<span style="display:inline-block;width:3px;height:3px;background:${a};border-radius:50%;flex-shrink:0;margin-right:4px;"></span>`;
  return `<div class="sl ${posClass}" style="background:#0c0c0c;border:1px solid ${ha(a,.3)};">
    <div class="p-bgr" style="background-image:linear-gradient(${ha(a,.04)} 1px,transparent 1px),linear-gradient(90deg,${ha(a,.04)} 1px,transparent 1px);background-size:9mm 9mm;"></div>
    <div class="sl-hbar" style="background:linear-gradient(to right,${a},transparent);"></div>
    <div class="sl-hlbl" style="color:${ha(a,.5)};">${S.tagline.replace('//','').trim()}</div>
    <div class="sl-wm" style="color:${a};">${S.figName.toUpperCase()}</div>
    <div class="sl-bck" style="border-right:1px dashed ${ha(a,.2)};"><div class="sl-blbl">BACK PANEL<br>TAPE HERE</div></div>
    <div class="sl-sep"></div>
    <div class="sl-pp" style="padding-top:18px;">
      <div class="sl-br" style="color:${g};">RL<br>GOODS</div>
      <div class="sl-tg" style="color:${ha(a,.6)};">${S.tagline}</div>
    </div>
    <div class="sl-sep"></div>
    <div class="sl-pp" style="padding-top:18px;">
      <div class="sl-lbl" style="color:${ha(a,.6)};">// ITEM NO: ${S.itemNo}</div>
      <div class="sl-fig">${S.figName}</div>
      <div class="sl-thm">${S.figTheme}</div>
      ${S.showSet?`<div class="sl-sr" style="color:${ha(a,.45)};">${S.setName} · Set ${S.setNo}</div>`:''}
      <div class="sl-fts">
        ${S.showSet?`<div class="sl-ft">${dot}UCS exclusive — never sold separately</div>`:''}
        ${S.showCase?`<div class="sl-ft">${dot}Light-compatible acrylic display case</div>`:''}
        <div class="sl-ft">${dot}Hand-inspected before sale</div>
      </div>
    </div>
    <div class="sl-sep"></div>
    <div class="sl-rp" style="padding-top:18px;">
      <div class="sl-cnd" style="background:${ha(a,.15)};border-color:${ha(a,.55)};color:${a};">
        <span style="display:inline-block;width:4px;height:4px;background:${a};border-radius:50%;"></span>${S.badge.split(' ')[0]}
      </div>
      <div class="sl-scs"><div class="sl-sc">${S.fb}</div><div class="sl-sc">${S.ig}</div></div>
    </div>
    <div class="sl-tab" style="background:#0a0a0a;border-left:1px dashed ${ha(a,.4)};"><div class="sl-tlbl">OVERLAP · TAPE</div></div>
  </div>`;
}

/* ════ RENDER ════ */
function renderIC(){ document.getElementById('icWrap').innerHTML=icHTML(''); }

function renderSL(){
  const wrap=document.getElementById('slWrap');
  wrap.innerHTML=slHTML('')+
    `<div class="fold-mk" style="left:1.89in;"><div class="fold-lbl" style="left:2px;">FOLD 1</div></div>`+
    `<div class="fold-mk" style="left:3.78in;"><div class="fold-lbl" style="left:2px;">FOLD 2</div></div>`+
    `<div class="fold-mk" style="left:5.67in;"><div class="fold-lbl" style="left:2px;">FOLD 3</div></div>`+
    `<div class="fold-mk" style="left:7.56in;"><div class="fold-lbl" style="left:2px;">TAB</div></div>`;
  document.getElementById('slCaption').textContent='← BACK  ·  RL GOODS  ·  FRONT (fig info)  ·  SIDE (badge)  ·  TAB →   —   score gold lines before folding';
}

function update(){
  readInputs(); renderIC(); renderSL(); save();
}

/* ════ PRINT ════ */
function triggerPrint(){
  const sheet=document.getElementById('printSheet');
  if(S.activePage==='insert'){
    sheet.innerHTML=icHTML('ps-ic')+
      `<div class="ps-ic-cut"></div>`+
      `<div class="ps-ic-lbl">CUT LINE — INSERT CARD  (1.5 × 2.5 in)</div>`+
      `<div class="ps-footer">RL GOODS · ${S.figName.toUpperCase()} · ${S.itemNo} · INSERT CARD</div>`;
  } else {
    sheet.innerHTML=slHTML('ps-sl')+
      `<div class="ps-sl-cut"></div>`+
      `<div class="ps-sl-lbl">CUT LINE — SLEEVE (all 4 sides + tab)</div>`+
      `<div class="ps-score" style="left:2.06in;top:0.4in;height:2.92in;"></div><div class="ps-slbl" style="left:2.09in;top:0.45in;">FOLD</div>`+
      `<div class="ps-score" style="left:3.95in;top:0.4in;height:2.92in;"></div><div class="ps-slbl" style="left:3.98in;top:0.45in;">FOLD</div>`+
      `<div class="ps-score" style="left:5.84in;top:0.4in;height:2.92in;"></div><div class="ps-slbl" style="left:5.87in;top:0.45in;">FOLD</div>`+
      `<div class="ps-score" style="left:7.73in;top:0.4in;height:2.92in;"></div><div class="ps-slbl" style="left:7.76in;top:0.45in;">TAB</div>`+
      `<div class="ps-footer">RL GOODS · ${S.figName.toUpperCase()} · ${S.itemNo} · SLEEVE</div>`;
  }
  window.print();
}

/* ════ INIT ════ */
load();

// restore inputs
document.getElementById('figName').value  =S.figName;
document.getElementById('figTheme').value =S.figTheme;
document.getElementById('itemNo').value   =S.itemNo;
document.getElementById('refNo').value    =S.refNo;
document.getElementById('setName').value  =S.setName;
document.getElementById('setNo').value    =S.setNo;
document.getElementById('bio').value      =S.bio;
document.getElementById('fbHandle').value =S.fb;
document.getElementById('igHandle').value =S.ig;
document.getElementById('colorPicker').value=S.accent;
document.getElementById('colorHex').value   =S.accent;
document.getElementById('goldPicker').value =S.gold;
document.getElementById('goldHex').value    =S.gold;

// restore toggles
[['showHTF','togHTF'],['showBio','togBio'],['showSet','togSet'],['showCase','togCase']].forEach(([k,id])=>{
  document.getElementById(id).classList.toggle('on',S[k]);
});

// restore badge button
const badgeMap={'HARD TO FIND':0,"COLLECTOR'S PICK":1,'LICENSED THEME':2,'RETIRED THEME':3,'GOOD CONDITION':4,'BUNDLE PACK':5};
const badgeBtns=document.querySelectorAll('.badge-btn');
const bi=badgeMap[S.badge]??0;
badgeBtns.forEach(b=>b.classList.remove('active'));
if(badgeBtns[bi]) badgeBtns[bi].classList.add('active');

switchTab(S.activePage||'insert');
buildSwatches();
update();
</script>
</body>
</html>
